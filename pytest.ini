[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Live tests are excluded by default. To run them:
#   pytest --override-ini="addopts=-v --tb=short" -m live tests/live/
# To run a specific family:
#   pytest --override-ini="addopts=-v --tb=short" -m "live and mlx_qwen" tests/live/
addopts = -v --tb=short -m "not live"
markers =
    live: live LLM integration tests that make real API/model calls (deselect with '-m not live')
    mlx_qwen: MLX Qwen/Qwen3 family live tests — requires MLX_QWEN_MODEL_ID env var
    mlx_deepseek: MLX DeepSeek-R1 family live tests — requires MLX_DEEPSEEK_MODEL_ID env var
    mlx_kimi: MLX Kimi/Moonshot family live tests — requires MLX_KIMI_MODEL_ID env var
timeout = 120
